name: TinyCols C tests

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
    - name: Install build dependencies
      run: dnf install -y gcc make libasan libubsan
    - uses: actions/checkout@v4
    - name: make tests
      run: make tests
    - name: test_queue
      run: ./build/test_queue
    - name: test_tinycols
      run: ./build/test_tinycols

  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    permissions:
      contents: write
    steps:
    - name: Install build dependencies
      run: dnf install -y gcc make ncurses-devel rpm-build git
    - uses: actions/checkout@v4
    - name: Build RPM and source tarball
      run: make rpm
    - name: Collect artifacts
      id: artifacts
      run: |
        RPM=$(find build/rpm/RPMS -name '*.rpm' | head -1)
        SRPM=$(find build/rpm/SRPMS -name '*.rpm' | head -1)
        echo "rpm=$RPM" >> $GITHUB_OUTPUT
        echo "srpm=$SRPM" >> $GITHUB_OUTPUT
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ steps.artifacts.outputs.rpm }}
          ${{ steps.artifacts.outputs.srpm }}
          build/tinycols-*.tar.gz
